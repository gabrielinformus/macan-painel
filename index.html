// ===== FATURAMENTO & METAS =====
function renderFaturamento() {
  var el = document.getElementById('app-content');
  var now = new Date();
  var h = '';

  if (!state.faturamento.mensal) state.faturamento.mensal = {};

  // Calcular faturamento total (manual mensal + consultores)
  var fatAnual = 0;
  var monthTotals = {};
  for (var mi = 1; mi <= 12; mi++) {
    var mk = now.getFullYear() + '-' + String(mi).padStart(2,'0');
    var mesTotal = 0;
    // Faturamento dos consultores
    CONSULTORES.forEach(function(con) {
      (state.consultores[con.id].faturamento[mk]||[]).forEach(function(f){ mesTotal += (f.valor||0); });
    });
    // Faturamento manual do mês
    var manual = state.faturamento.mensal[mk] || 0;
    mesTotal += manual;
    monthTotals[mk] = mesTotal;
    fatAnual += mesTotal;
  }

  var pct = state.faturamento.metaAnual > 0 ? Math.round(fatAnual / state.faturamento.metaAnual * 100) : 0;

  // Stats
  h += '<div class="stats-grid">';
  h += statCard('Meta Anual', 'R$ ' + formatNum(state.faturamento.metaAnual), now.getFullYear());
  h += statCard('Faturamento Total', 'R$ ' + formatNum(fatAnual), 'acumulado');
  h += statCard('Atingimento', pct + '%', 'da meta anual');
  h += statCard('Falta', 'R$ ' + formatNum(Math.max(0, state.faturamento.metaAnual - fatAnual)), 'para bater');
  h += '</div>';

  // Meta anual editável
  h += '<div class="card" style="margin-bottom:20px"><div class="card-body" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">';
  h += '<div style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;font-weight:600;color:var(--gray-600)">Meta Anual:</span>';
  h += '<div style="position:relative"><span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--gray-400)">R$</span>';
  h += '<input type="text" inputmode="numeric" class="form-input" style="width:200px;padding-left:34px" value="' + formatNum(state.faturamento.metaAnual) + '" oninput="maskMoney(this)" onchange="state.faturamento.metaAnual=unmaskMoney(this.value);saveState();renderContent()"></div></div>';
  h += '</div></div>';

  // Progress bar
  h += '<div class="card" style="margin-bottom:20px"><div class="card-header"><h3>Progresso Anual</h3></div><div class="card-body">';
  h += '<div style="background:var(--gray-100);border-radius:999px;height:32px;overflow:hidden;position:relative">';
  var barColor = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--navy-400)' : 'var(--navy-600)';
  h += '<div style="width:' + Math.min(100, pct) + '%;height:100%;background:linear-gradient(90deg,' + barColor + ',' + barColor + ');border-radius:999px;transition:width 0.5s"></div>';
  h += '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:' + (pct > 45 ? '#fff' : 'var(--gray-700)') + '">' + pct + '% — R$ ' + formatNum(fatAnual) + ' de R$ ' + formatNum(state.faturamento.metaAnual) + '</div>';
  h += '</div></div></div>';

  // Faturamento mensal editável
  h += '<div class="card" style="margin-bottom:20px"><div class="card-header"><h3>Faturamento por Mês</h3></div><div class="card-body">';
  h += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">';
  for (var mi = 1; mi <= 12; mi++) {
    var mk = now.getFullYear() + '-' + String(mi).padStart(2,'0');
    var mesTotal = monthTotals[mk] || 0;
    var manual = state.faturamento.mensal[mk] || 0;
    var consFat = mesTotal - manual;
    var isCurrentMonth = mi === (now.getMonth() + 1);
    h += '<div style="background:' + (isCurrentMonth ? 'var(--navy-50)' : 'var(--gray-50)') + ';border-radius:10px;padding:16px;border:' + (isCurrentMonth ? '2px solid var(--navy-200)' : '1px solid var(--gray-200)') + '">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
    h += '<span style="font-size:13px;font-weight:700;color:var(--gray-700)">' + MESES_FULL[mi-1] + '</span>';
    if (isCurrentMonth) h += '<span style="font-size:9px;font-weight:700;background:var(--navy-600);color:#fff;padding:2px 8px;border-radius:99px;text-transform:uppercase">Atual</span>';
    h += '</div>';
    h += '<div style="font-size:22px;font-weight:800;color:' + (mesTotal > 0 ? 'var(--green)' : 'var(--gray-300)') + ';margin-bottom:8px">R$ ' + formatNum(mesTotal) + '</div>';
    if (consFat > 0) h += '<div style="font-size:10px;color:var(--gray-400);margin-bottom:4px">Consultores: R$ ' + formatNum(consFat) + '</div>';
    h += '<div style="display:flex;align-items:center;gap:6px">';
    h += '<span style="font-size:10px;color:var(--gray-400);white-space:nowrap">Faturamento:</span>';
    h += '<div style="position:relative;flex:1"><span style="position:absolute;left:6px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--gray-400)">R$</span>';
    h += '<input type="text" inputmode="numeric" class="form-input" style="font-size:12px;padding:4px 6px 4px 24px;width:100%" value="' + (manual > 0 ? formatNum(manual) : '') + '" oninput="maskMoney(this)" onchange="saveFatMensal(\'' + mk + '\',this.value)">';
    h += '</div></div>';
    // Mini progress
    if (state.faturamento.metaAnual > 0) {
      var metaMes = Math.round(state.faturamento.metaAnual / 12);
      var pctMes = metaMes > 0 ? Math.min(100, Math.round(mesTotal / metaMes * 100)) : 0;
      h += '<div style="margin-top:8px;background:var(--gray-200);border-radius:99px;height:4px;overflow:hidden">';
      h += '<div style="width:' + pctMes + '%;height:100%;background:' + (pctMes >= 100 ? 'var(--green)' : 'var(--navy-400)') + ';border-radius:99px"></div></div>';
      h += '<div style="font-size:9px;color:var(--gray-400);margin-top:3px;text-align:right">' + pctMes + '% da meta mensal (R$ ' + formatNum(metaMes) + ')</div>';
    }
    h += '</div>';
  }
  h += '</div></div></div>';

  // Chart visual
  h += '<div class="card" style="margin-bottom:20px"><div class="card-header"><h3>Gráfico Anual</h3></div><div class="card-body">';
  h += '<div class="chart-area" style="position:relative" id="fat-chart">';
  var maxVal = 1;
  var monthData = [];
  for (var mi = 1; mi <= 12; mi++) {
    var mk = now.getFullYear() + '-' + String(mi).padStart(2,'0');
    var total = monthTotals[mk] || 0;
    monthData.push({ month: MESES[mi-1], total: total });
    if (total > maxVal) maxVal = total;
  }
  monthData.forEach(function(d) {
    var barH = maxVal > 0 ? Math.max(4, (d.total / maxVal) * 200) : 4;
    h += '<div class="chart-bar-wrap">';
    h += '<div style="position:relative;width:100%;height:200px;display:flex;align-items:flex-end">';
    h += '<div class="chart-bar" style="height:' + barH + 'px" onmouseenter="showFatTooltip(event,\'R$ ' + formatNum(d.total) + '\')" onmouseleave="hideFatTooltip()"></div>';
    h += '</div>';
    h += '<div class="chart-label">' + d.month + '</div></div>';
  });
  h += '<div class="chart-tooltip" id="fat-tooltip"></div>';
  h += '</div></div></div>';

  // Per consultor
  h += '<div class="card"><div class="card-header"><h3>Faturamento por Consultor</h3></div><div class="card-body">';
  h += '<table class="data-table"><thead><tr><th>Consultor</th>';
  for (var mi = 1; mi <= 12; mi++) h += '<th style="text-align:right">' + MESES[mi-1] + '</th>';
  h += '<th style="text-align:right">Total</th></tr></thead><tbody>';
  CONSULTORES.forEach(function(con) {
    var d = state.consultores[con.id];
    var total = 0;
    h += '<tr><td><strong>' + escHtml(con.nome) + '</strong></td>';
    for (var mi = 1; mi <= 12; mi++) {
      var mk = now.getFullYear() + '-' + String(mi).padStart(2,'0');
      var v = 0; (d.faturamento[mk]||[]).forEach(function(f){ v += (f.valor||0); });
      total += v;
      h += '<td style="text-align:right;font-size:12px;color:' + (v > 0 ? 'var(--green)' : 'var(--gray-300)') + '">' + (v > 0 ? 'R$ ' + formatNum(v) : '-') + '</td>';
    }
    h += '<td style="text-align:right;font-weight:700">R$ ' + formatNum(total) + '</td></tr>';
  });
  h += '</tbody></table></div></div>';

  el.innerHTML = h;
}

function saveFatMensal(mk, val) {
  if (!state.faturamento.mensal) state.faturamento.mensal = {};
  state.faturamento.mensal[mk] = unmaskMoney(val);
  saveState(); renderContent();
}

function showFatTooltip(e, text) {
  var tip = document.getElementById('fat-tooltip');
  if (!tip) return;
  tip.textContent = text;
  tip.style.display = 'block';
  tip.style.left = (e.target.getBoundingClientRect().left - document.getElementById('fat-chart').getBoundingClientRect().left) + 'px';
  tip.style.top = (e.target.offsetTop - 30) + 'px';
}
function hideFatTooltip() {
  var tip = document.getElementById('fat-tooltip'); if (tip) tip.style.display = 'none';
}

// ===== MODAL SYSTEM =====
function showModal(title, fields, onSave, saveLabel, onDelete) {
  var root = document.getElementById('modal-root');
  var h = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">';
  h += '<div class="modal"><div class="modal-header"><h3>' + escHtml(title) + '</h3>';
  h += '<button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
  h += '</div><div class="modal-body">';
  fields.forEach(function(f) {
    h += '<div style="margin-bottom:14px"><label class="form-label">' + f.label + '</label>';
    if (f.type === 'textarea') {
      h += '<textarea id="' + f.id + '" class="form-input">' + escHtml(f.value||'') + '</textarea>';
    } else if (f.type === 'select') {
      h += '<select id="' + f.id + '" class="form-input">';
      (f.options||[]).forEach(function(opt) {
        h += '<option value="' + escHtml(opt) + '"' + (f.value===opt?' selected':'') + '>' + escHtml(opt) + '</option>';
      });
      h += '</select>';
    } else if (f.type === 'money') {
      var mv = f.value ? formatNum(f.value) : '';
      h += '<input id="' + f.id + '" type="text" inputmode="numeric" class="form-input" value="' + escHtml(mv) + '" oninput="maskMoney(this)" placeholder="0">';
    } else {
      h += '<input id="' + f.id + '" type="' + f.type + '" class="form-input" value="' + escHtml(f.value||'') + '">';
    }
    h += '</div>';
  });
  h += '</div><div class="modal-footer">';
  if (onDelete) h += '<button class="btn" id="modal-delete-btn" style="background:var(--red);color:#fff;margin-right:auto">Excluir</button>';
  h += '<button class="btn btn-outline" onclick="closeModal()">Cancelar</button>';
  h += '<button class="btn btn-primary" id="modal-save-btn">' + escHtml(saveLabel||'Salvar') + '</button>';
  h += '</div></div></div>';
  root.innerHTML = h;
  document.getElementById('modal-save-btn').onclick = onSave;
  if (onDelete) document.getElementById('modal-delete-btn').onclick = onDelete;
  setTimeout(function(){ var first = root.querySelector('input,select,textarea'); if(first) first.focus(); }, 50);
}

function showInfoModal(title, bodyHtml) {
  var root = document.getElementById('modal-root');
  var h = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">';
  h += '<div class="modal"><div class="modal-header"><h3>' + escHtml(title) + '</h3>';
  h += '<button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
  h += '</div><div class="modal-body">' + bodyHtml + '</div></div></div>';
  root.innerHTML = h;
}

function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}

// ===== AUTH =====
var AUTH_USERS = [
  { user: 'gabriel', pass: 'macan2026', nome: 'Gabriel', role: 'admin' }
];
var _currentUser = null;

function uploadLogo() {
  var inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = function() {
    if (!inp.files[0]) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      openCropModal(e.target.result, function(base64) {
        state.logoBase64 = base64;
        saveState();
        applyLogo();
      });
    };
    reader.readAsDataURL(inp.files[0]);
  };
  inp.click();
}

function applyLogo() {
  var sidebarLogo = document.getElementById('sidebar-logo');
  var loginLogo = document.getElementById('login-logo-wrap');
  if (state && state.logoBase64) {
    var ssvg = document.getElementById('sidebar-logo-svg');
    if (ssvg) ssvg.style.display = 'none';
    var existImg = sidebarLogo.querySelector('img');
    if (!existImg) { existImg = document.createElement('img'); sidebarLogo.appendChild(existImg); }
    existImg.src = state.logoBase64;
    var lsvg = document.getElementById('login-logo-svg');
    if (lsvg) lsvg.style.display = 'none';
    if (loginLogo) {
      var lexist = loginLogo.querySelector('img');
      if (!lexist) { lexist = document.createElement('img'); loginLogo.appendChild(lexist); }
      lexist.src = state.logoBase64;
    }
  }
}

function checkAuth() {
  var saved = localStorage.getItem('macan_auth');
  if (saved) {
    try {
      var u = JSON.parse(saved);
      var found = AUTH_USERS.find(function(a){ return a.user === u.user && a.pass === u.pass; });
      if (found) { _currentUser = found; return true; }
    } catch(e) {}
  }
  return false;
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.querySelector('.sidebar').style.display = 'none';
  document.querySelector('.main').style.display = 'none';
  document.getElementById('ticker-bar').style.display = 'none';
  applyLogo();
  setTimeout(function(){ document.getElementById('login-user').focus(); }, 100);
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.querySelector('.sidebar').style.display = 'flex';
  document.querySelector('.main').style.display = 'block';
  var userEl = document.getElementById('topbar-user');
  if (userEl && _currentUser) userEl.textContent = _currentUser.nome;
  applyLogo();
  renderSidebar();
  renderContent();
}

function doLogin() {
  var user = document.getElementById('login-user').value.trim().toLowerCase();
  var pass = document.getElementById('login-pass').value;
  var found = AUTH_USERS.find(function(a){ return a.user === user && a.pass === pass; });
  if (found) {
    _currentUser = found;
    localStorage.setItem('macan_auth', JSON.stringify({ user: found.user, pass: found.pass }));
    document.getElementById('login-error').style.display = 'none';
    showApp();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
  }
}

function doLogout() {
  _currentUser = null;
  localStorage.removeItem('macan_auth');
  showLogin();
}

// ===== INIT =====
if (checkAuth()) {
  showApp();
} else {
  showLogin();
}
</script>
